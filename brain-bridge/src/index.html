<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: transparent;
      color: #e0e0e0;
      user-select: none;
      overflow: hidden;
    }

    .container {
      background: #1e1e2e;
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* 頂部箭頭 */
    .arrow {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: -1px;
    }
    .arrow::before {
      content: '';
      width: 12px;
      height: 12px;
      background: #1e1e2e;
      border: 1px solid #333;
      border-bottom: none;
      border-right: none;
      transform: rotate(45deg);
      margin-top: -6px;
    }

    /* 狀態頭部 */
    .header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a3a;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.running { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.4); }
    .status-dot.stopped { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.3); }

    .header-info { flex: 1; }
    .header-title { font-size: 13px; font-weight: 600; }
    .header-sub { font-size: 11px; color: #888; margin-top: 2px; }

    .toggle-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.start { background: #4ade80; color: #000; }
    .toggle-btn.start:hover { background: #22c55e; }
    .toggle-btn.stop { background: #ef4444; color: #fff; }
    .toggle-btn.stop:hover { background: #dc2626; }

    /* 專案區 */
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a3a;
    }
    .section-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .project-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }
    .project-item:hover { background: #2a2a3a; }
    .project-item.active { background: #2a2a3a; }
    .project-item.active::before { content: '→'; color: #4ade80; font-size: 12px; }
    .project-path { font-size: 10px; color: #555; margin-left: auto; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Log 區 */
    .logs {
      padding: 8px 12px;
      max-height: 160px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 10px;
      line-height: 1.6;
      color: #888;
    }
    .logs::-webkit-scrollbar { width: 4px; }
    .logs::-webkit-scrollbar-track { background: transparent; }
    .logs::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .log-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 底部 */
    .footer {
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #2a2a3a;
    }
    .footer-info { font-size: 11px; color: #555; }
    .footer-btn {
      font-size: 11px;
      color: #4ade80;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
    }
    .footer-btn:hover { text-decoration: underline; }

    /* 統計 */
    .stats {
      display: flex;
      gap: 16px;
      padding: 8px 16px;
      border-bottom: 1px solid #2a2a3a;
    }
    .stat { text-align: center; flex: 1; }
    .stat-value { font-size: 18px; font-weight: 700; color: #fff; }
    .stat-label { font-size: 10px; color: #666; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="arrow"></div>
  <div class="container">
    <!-- 狀態頭部 -->
    <div class="header">
      <div class="status-dot" id="statusDot"></div>
      <div class="header-info">
        <div class="header-title" id="statusText">已停止</div>
        <div class="header-sub" id="projectName">未設定專案</div>
      </div>
      <button class="toggle-btn" id="toggleBtn" onclick="window.bridge.toggle()">啟動</button>
    </div>

    <!-- 統計 -->
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="taskCount">0</div>
        <div class="stat-label">執行中任務</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="uptime">--</div>
        <div class="stat-label">運行時間</div>
      </div>
    </div>

    <!-- 專案列表 -->
    <div class="section">
      <div class="section-title">專案</div>
      <div id="projectList"></div>
    </div>

    <!-- Log -->
    <div class="section" style="border-bottom: none; padding-bottom: 0;">
      <div class="section-title">最近日誌</div>
    </div>
    <div class="logs" id="logArea"></div>

    <!-- 底部 -->
    <div class="footer">
      <span class="footer-info" id="footerInfo">BrainBridge v1.0</span>
      <button class="footer-btn" onclick="window.bridge.openLog()">開啟完整 Log</button>
    </div>
  </div>

  <script>
    function formatUptime(seconds) {
      if (!seconds || seconds <= 0) return '--';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function updateUI(data) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      const project = document.getElementById('projectName');
      const btn = document.getElementById('toggleBtn');
      const tasks = document.getElementById('taskCount');
      const uptime = document.getElementById('uptime');
      const logArea = document.getElementById('logArea');
      const projectList = document.getElementById('projectList');

      // 狀態
      dot.className = `status-dot ${data.running ? 'running' : 'stopped'}`;
      text.textContent = data.running ? '🟢 Bridge 運行中' : '🔴 Bridge 已停止';
      project.textContent = data.currentProject ? `📁 ${data.currentProject}` : '未設定專案';
      btn.textContent = data.running ? '停止' : '啟動';
      btn.className = `toggle-btn ${data.running ? 'stop' : 'start'}`;

      // 統計
      tasks.textContent = data.taskCount || 0;
      uptime.textContent = formatUptime(data.uptime);

      // 專案列表
      const entries = Object.entries(data.projects || {});
      projectList.innerHTML = entries.length > 0
        ? entries.map(([name, dir]) => `
            <div class="project-item ${name === data.currentProject ? 'active' : ''}"
                 onclick="window.bridge.switchProject('${name}')">
              <span>${name}</span>
              <span class="project-path">${dir}</span>
            </div>
          `).join('')
        : '<div style="font-size:12px;color:#555;padding:4px 8px;">尚無專案</div>';

      // Log
      if (data.logs && data.logs.length > 0) {
        logArea.innerHTML = data.logs
          .map(l => `<div class="log-line">${l.replace(/</g, '&lt;')}</div>`)
          .join('');
        logArea.scrollTop = logArea.scrollHeight;
      }
    }

    // 初始載入
    window.bridge.getStatus().then(updateUI);
    // 接收即時更新
    window.bridge.onStatusUpdate(updateUI);
  </script>
</body>
</html>
